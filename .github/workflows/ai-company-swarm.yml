name: AI Virtual Company (Board Meeting)

on:
  workflow_dispatch:
    inputs:
      directive:
        description: "The directive or goal for the virtual C-suite to execute (max 500 chars)"
        required: true
        type: string
        default: "Review our recent metrics and deploy a new A/B test to improve Pro conversion rates."
  workflow_call:
    inputs:
      directive:
        description: "Board directive"
        required: false
        type: string
        default: "Review last week's metrics. Identify the single highest-leverage improvement to Pro conversion or retention. Ship it."

permissions:
  contents: write
  pull-requests: write

jobs:
  run-swarm:
    runs-on: ubuntu-latest
    outputs:
      pr_url: ${{ steps.swarm.outputs.pr_url }}
      cqo_verdict: ${{ steps.swarm.outputs.cqo_verdict }}

    steps:
      - name: Checkout PM Streak Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to push swarm-memory commits

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install AI Dependencies
        run: pip install -r scripts/virtual-company/requirements.txt

      - name: Setup Node.js (for TypeScript check)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Execute Board Meeting
        id: swarm
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOARD_DIRECTIVE: ${{ inputs.directive || github.event.inputs.directive }}
          GA4_PROPERTY_ID: "529697573"
        run: |
          python scripts/virtual-company/run_board_meeting.py
          PR_URL=$(cat scripts/virtual-company/pr_url.txt 2>/dev/null || echo "")
          CQO_VERDICT=$(cat scripts/virtual-company/cqo_verdict.txt 2>/dev/null || echo "UNKNOWN")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "cqo_verdict=$CQO_VERDICT" >> $GITHUB_OUTPUT
          echo "PR URL: $PR_URL"
          echo "CQO Verdict: $CQO_VERDICT"

      - name: Commit swarm memory to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "PM Streak AI Swarm"
          git config user.email "swarm@pmstreak.app"
          git add scripts/virtual-company/swarm-memory/ || true
          git diff --cached --quiet || git commit -m "chore(swarm): save board meeting memory [skip ci]"
          git push origin HEAD || true

      - name: TypeScript syntax check on PR branch
        if: steps.swarm.outputs.pr_url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ steps.swarm.outputs.pr_url }}"
          # Extract PR number from URL
          PR_NUM=$(echo "$PR_URL" | grep -oP '(?<=/pull/)\d+')
          if [ -z "$PR_NUM" ]; then
            echo "Could not extract PR number from: $PR_URL"
            echo "TS_VALID=false" >> $GITHUB_ENV
            exit 0
          fi
          # Get the branch name from the PR
          BRANCH=$(gh pr view "$PR_NUM" --json headRefName -q .headRefName)
          echo "Checking out branch: $BRANCH"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          # Run TypeScript compiler check
          if npx tsc --noEmit 2>&1; then
            echo "TS_VALID=true" >> $GITHUB_ENV
            echo "✅ TypeScript check passed"
          else
            echo "TS_VALID=false" >> $GITHUB_ENV
            echo "❌ TypeScript check failed — will not auto-merge"
          fi
          git checkout main

      - name: Auto-merge if CQO approves and TypeScript passes
        if: |
          steps.swarm.outputs.pr_url != '' &&
          steps.swarm.outputs.cqo_verdict == 'APPROVE' &&
          env.TS_VALID == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ steps.swarm.outputs.pr_url }}"
          PR_NUM=$(echo "$PR_URL" | grep -oP '(?<=/pull/)\d+')
          echo "✅ CQO approved + TS check passed — auto-merging PR #$PR_NUM"
          gh pr merge "$PR_NUM" --squash --auto --delete-branch
          echo "🎉 PR #$PR_NUM merged and branch deleted."

      - name: Report outcome
        if: always()
        run: |
          echo "===================================="
          echo "Board Meeting Complete"
          echo "PR URL:      ${{ steps.swarm.outputs.pr_url || 'none' }}"
          echo "CQO Verdict: ${{ steps.swarm.outputs.cqo_verdict || 'UNKNOWN' }}"
          echo "TS Valid:    ${{ env.TS_VALID || 'not checked' }}"
          echo "===================================="
